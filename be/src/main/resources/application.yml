spring:
  application:
    name: team-manager
  exposed:
    show-sql: true

app:
  jwt:
    secret: ${JWT_SECRET}
    issuer: team-manager
    access-token-expiration: 15m
    refresh-token-expiration: 7d
    refresh-cookie-secure: ${JWT_REFRESH_COOKIE_SECURE:false}
    cookie-same-site: ${JWT_COOKIE_SAME_SITE:Lax}
